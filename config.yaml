# --- CORE SETTINGS ---
keywords:
  - "Agentic AI"
  # - "Sovereign AI"
  # - "n8n"
  # "Intelligent Automation"
  # "Claude Code"
  # "Antigravity" 
  # "Codex"

apify_token: "${APIFY_TOKEN}"
number_of_posts_to_fetch: 20
posts_per_keyword: 1  # how many LinkedIn posts to generate per keyword
research_depth: shallow   # shallow = 3 sources, deep = 8+ sources
output_sheet_id: "${GOOGLE_SHEET_ID}"
language: "de"
post_style: "thought leadership, concise, data-driven, no fluff"

# --- TIME RANGE FILTER ---
scrape_time_range:
  unit: weeks   # options: days | weeks | months
  value: 2

# --- OPTIONAL FEATURES ---

# Feature 1: Hook generation as separate output field
generate_hook: true

# Feature 3: Engagement scoring for scraped post ranking
engagement_scoring:
  enabled: true
  likes_weight: 1
  comments_weight: 3
  shares_weight: 5

# Feature 4: Personal voice / writing style injection
voice_samples:
  enabled: false
  samples:
    - "Beispiel-Post 1 Text hier..."
    - "Beispiel-Post 2 Text hier..."
    - "Beispiel-Post 3 Text hier..."

# Feature 7: CTA type per post
cta:
  enabled: true
  type: frage_an_community
  # options: frage_an_community | ressource_teilen | meinung_einfordern | newsletter_link

# Feature 8: Hashtag strategy
hashtags:
  enabled: true
  broad_count: 2
  niche_count: 3

# Feature: Content quality rules (injected into generation prompt)
content_rules:
  verified_case_studies_only: true  # Only cite case studies from Gartner, Deloitte, McKinsey, Forrester, IDC
  cite_statistics: true             # All statistics must include source inline e.g. (Deloitte, 2025)

# Feature: LinkedIn post optimizer — runs after generation, before image gen
# Assembles full post (title + hook + body + CTA + hashtags), optimizes for LinkedIn algorithm
post_optimization:
  enabled: true

# Feature 9: Image generation (DALL-E 3 → imgbb → =IMAGE() in Sheets)
image_generation:
  enabled: true
  # Requires OPENAI_API_KEY and IMGBB_API_KEY in .env

# Feature 10: Email notification after each post is written to Sheets
# Each email contains the full post text + image.
# Reply with the trigger word to approve publishing to LinkedIn.
email_notification:
  enabled: true
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "${EMAIL_USER}"
  sender_password: "${EMAIL_PASSWORD}"   # Gmail App Password (not your account password)
  recipient_email: "${EMAIL_RECIPIENT}"
  reply_trigger: "Post"   # reply with exactly this word to publish to LinkedIn

# Feature 11: LinkedIn auto-posting triggered by email reply
# Run: python reply_checker.py --once  (after replying to the email)
#   or: python reply_checker.py        (polling loop, checks every 60s)
linkedin_posting:
  enabled: true
  access_token: "${LINKEDIN_ACCESS_TOKEN}"
  person_urn: "${LINKEDIN_PERSON_URN}"   # format: urn:li:person:XXXXXXXX
