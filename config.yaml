# --- CORE SETTINGS ---
keywords:
  - "Claude Code"
  - "Antigravity" 
  # "Codex"
  - "Agentic AI"
  - "Ai Agents"
  - "n8n"
  - "Intelligent Automation"
  # "Codex"
    # - "Sovereign AI"

# --- KEYWORD ROTATION ---
# enabled: true  → rotate through keywords; each gets max_runs_per_keyword runs before switching
# pinned: [...]  → if set, ONLY these keywords are used every run (rotation skipped)
# pinned: []     → no pinned keywords, full rotation active
keyword_rotation:
  enabled: true
  max_runs_per_keyword: 3
  pinned: []   # e.g. ["Intelligent Automation"] to always use that keyword

apify_token: "${APIFY_TOKEN}"
number_of_posts_to_fetch: 20
posts_per_keyword: 1  # how many LinkedIn posts to generate per keyword
research_depth: shallow   # shallow = 3 sources, deep = 8+ sources
output_sheet_id: "${GOOGLE_SHEET_ID}"
language: "de"
post_style: "thought leadership, concise, data-driven, no fluff"

# --- TIME RANGE FILTER ---
scrape_time_range:
  unit: weeks   # options: days | weeks | months
  value: 2

# --- OPTIONAL FEATURES ---

# Feature 1: Hook generation as separate output field
generate_hook: true

# Feature 3: Engagement scoring for scraped post ranking
engagement_scoring:
  enabled: true
  likes_weight: 1
  comments_weight: 3
  shares_weight: 5

# Feature 4: Personal voice / writing style injection
voice_samples:
  enabled: false
  samples:
    - "Beispiel-Post 1 Text hier..."
    - "Beispiel-Post 2 Text hier..."
    - "Beispiel-Post 3 Text hier..."

# Feature 7: CTA type per post
cta:
  enabled: true
  type: frage_an_community
  # options: frage_an_community | ressource_teilen | meinung_einfordern | newsletter_link

# Feature 8: Hashtag strategy
hashtags:
  enabled: true
  broad_count: 2
  niche_count: 3

# Feature: Content quality rules (injected into generation prompt)
content_rules:
  verified_case_studies_only: true  # Only cite case studies from Gartner, Deloitte, McKinsey, Forrester, IDC
  cite_statistics: true             # All statistics must include source inline e.g. (Deloitte, 2025)

# Feature: LinkedIn post optimizer — runs after generation, before image gen
# Assembles full post (title + hook + body + CTA + hashtags), optimizes for LinkedIn algorithm
post_optimization:
  enabled: true

# Feature 9: Image generation (provider → imgbb → =IMAGE() in Sheets)
# provider options: ideogram (V3, recommended) | dalle3 (DALL-E 3)
image_generation:
  enabled: false   # set to true for production runs
  provider: ideogram   # Requires IDEOGRAM_API_KEY in .env
  # provider: dalle3   # Requires OPENAI_API_KEY in .env

# Feature 10: Telegram notification — sends post + 3 images with inline selection buttons
# TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID must be set in .env
# Get token: @BotFather → /newbot
# Get chat_id: message @userinfobot
telegram_notification:
  enabled: true

# Feature 11: LinkedIn auto-posting triggered by Telegram inline button (1/2/3)
# Run telegram_bot.py as a daemon (systemd service on VPS or: python telegram_bot.py)
linkedin_posting:
  enabled: true
  access_token: "${LINKEDIN_ACCESS_TOKEN}"
  person_urn: "${LINKEDIN_PERSON_URN}"   # format: urn:li:person:XXXXXXXX
